<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WELCOME</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="assets/fs.png" type="image/png">
    <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    .image-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .main-image {
      position: absolute;
      top: 50%;
      left: 50%;
      max-width: 100%;
      max-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: contain;
      transition: opacity 0.3s ease;
      z-index: 1;
    }

    img {
      -webkit-user-drag: none;  /* Prevent image from being dragged */
      user-select: none; /* Prevent image from being selected */
    }

    .click-zone {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      z-index: 2;
      background-color: transparent; /* No color overlay */
    }

    .left {
      left: 0;
    }

    .right {
      right: 0;
    }

    .click-zone:hover {
      cursor: pointer;
    }

    .click-zone:active {
      background-color: transparent; /* Prevent blue flash */
    }
  </style>
</head>
<body>
  <div class="image-wrapper">
    <img id="mainImage" class="main-image" src="./assets/main/index.png" alt="Main" />

    <div class="click-zone left"
         onmouseover="changeImage('left')"
         onmouseout="resetImage()"
         onclick="delayedRedirect('./pages/index.html')"></div>

    <div class="click-zone right"
         onmouseover="changeImage('right')"
         onmouseout="resetImage()"
         onclick="delayedRedirect('./minimal/index.html')"></div>
  </div>

  <script>
    const mainImage = document.getElementById("mainImage");

    const defaultSrc = "./assets/main/index.png";
    const leftHoverSrc = "./assets/main/index_red.png";
    const rightHoverSrc = "./assets/main/index_blue.png";



    function changeImage(side) {
      mainImage.src = side === 'left' ? leftHoverSrc : rightHoverSrc;
    }

    function resetImage() {
      mainImage.src = defaultSrc;
    }
    function delayedRedirect(url) {
      setTimeout(() => {
        location.href = url;
      }, 100); // 1000ms = 1 second delay before redirecting
    }

  </script>
</body>
</html>

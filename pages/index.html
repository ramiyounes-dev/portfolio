<body>
  <div id="loading-screen">
    <div class="loader-dots">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
  </div>

  <div class="back-img"></div>

  <div class="welcome-section">
    <img id="mainImage" src="../assets/welcome_eyes/center.png" alt="Interactive Image">
    <div class="caption">Hi, I'm Rami. I code for work and for fun.</div>
  </div>

  <img id="switchThemes" class="orbit-img" src="../assets/switch_themes.png" alt="About Me" data-link="../index.html">
  <img id="aboutSection" class="orbit-img" src="../assets/sections/aboutMe.png" alt="About Me" data-link="aboutMe.html">

  <section class="end">

        </a>
        <a href="https://www.linkedin.com/in/ramyounes/" class="contact-item">

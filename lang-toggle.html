<!DOCTYPE html>
<html>
  <head>
    <title>Language Toggle</title>
    <link rel="stylesheet" href="css/lang-toggle.css" />
  </head>
  <body>

   <form>
    <label class="toggle">
      <div class="toggle__wrapper">
        <input type="checkbox" id="lang-toggle">
        <div class="toggle__bg">
          <div class="toggle__text">FR</div>
          <div class="toggle__text toggle__text--right">EN</div>
          <div class="toggle__sphere">
            <div class="toggle__sphere-bg"></div>
            <div class="toggle__sphere-overlay"></div>
          </div>
        </div>
      </div>
    </label>
  </form>

  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="assets/fs.png" type="image/png">
  <link rel="stylesheet" href="loaders/index-load.css">

  <title>Theme?</title>
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
    }
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #1a1a1a;
      font-family: monospace;
      overflow: hidden;

      /* .unselectable */
      user-select: none;  /* For most browsers */
      -webkit-user-select: none;  /* For Safari */
      -moz-user-select: none;  /* For Firefox */
      -ms-user-select: none;  /* For Internet Explorer/Edge */
    }

    .screen {
      position: relative;
      width: 100%;
      height: 100%;
      background-color: #0b2416;
      box-shadow: 0 0 20px #00ff88;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #00ff88;
      overflow: hidden;
      animation: flicker 0.12s infinite alternate, jitter 2s infinite;
    }

    .screen::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 200%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 255, 0, 0.2),
        rgba(0, 255, 0, 0.2) 2px,
        rgba(0, 255, 0, 0.05) 2px,
        rgba(0, 255, 0, 0.05) 4px
      );
      animation: scanlines 0.5s linear infinite, boldLine 2s infinite;
      z-index: 1;
      pointer-events: none;
    }

    .screen::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, rgba(0,255,0,0.1) 0%, rgba(0,0,0,0.8) 80%);
      z-index: 2;
      pointer-events: none;
    }

    .menu {
      position: relative;
      z-index: 3;
      text-align: center;
      animation: fadeInUp 1s ease-out;
      text-shadow: 0 0 5px #00ff88;
    }

    .title {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      animation: pulse 1.2s infinite;
    }

    p {
      font-size: 1.3rem;
    }

    .screen p {
      margin: 0.5rem 0;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid transparent;
    }

    .screen p:hover {
      background-color: #00ff88;
      color: black;
      border-color: #00ff88;
      transform: scale(1.05);
      text-shadow: 0 0 5px #00ff88;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes flicker {
      0%   { opacity: 1; }
      20%  { opacity: 0.95; }
      40%  { opacity: 0.85; }
      60%  { opacity: 0.92; }
      80%  { opacity: 0.98; }
      100% { opacity: 1; }
    }

    @keyframes scanlines {
      0% { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }

    @keyframes boldLine {
      0%, 100% { background-size: 100% 4px; }
      50% { background-size: 100% 6px; }
    }

    @keyframes jitter {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(1px); }
    }
  </style>
</head>
<body>
  
  <div class="screen">
    <div class="menu">
      <div class="title">▶ SELECT YOUR THEME</div>
      <p data-theme="MINIMAL">RUN MINIMAL</p>
      <p data-theme="EXPRESSIVE">RUN EXPRESSIVE</p>

    </div>
  </div>

  <script src="./loaders/index-load.js"></script>

</body>
</html>

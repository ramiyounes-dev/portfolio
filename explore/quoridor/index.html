<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quoridor 3D</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body class="game-body">

  <div id="canvas-container"></div>

  <div id="mode-overlay">
    <div id="mode-box">
      <div id="mode-title">Quoridor 3D</div>
      <div id="mode-sub">Choose a game mode</div>
      <div id="mode-buttons">
        <button class="mode-btn" data-mode="local">2 Players (Local)</button>
        <button class="mode-btn" data-mode="ai">vs AI</button>
        <button class="mode-btn" data-mode="online">2 Players (Online)</button>
      </div>
      <div id="lobby-panel" class="hidden">
        <input id="room-input" type="text" maxlength="12" placeholder="Room code (e.g. ABCD)" autocomplete="off" spellcheck="false" />
        <button id="btn-join-room">Join Room</button>
        <div id="lobby-status"></div>
      </div>
    </div>
  </div>

  <div id="hud">
    <div id="hud-row-top">
      <div class="player-card player-a-card" id="card-a">
        <span class="player-label">RED <span id="you-a" class="you-badge hidden">YOU</span></span>
        <span class="wall-count"><span id="hud-walls-a">10</span> <small>walls</small></span>
        <span class="score-line" id="score-a">0 <small>wins</small></span>
      </div>

      <div id="hud-center">
        <div id="hud-turn">Red's Turn</div>
        <div id="hud-hint">Click your pawn to select</div>
      </div>

      <div class="player-card player-b-card" id="card-b">
        <span class="player-label">WHITE <span id="you-b" class="you-badge hidden">YOU</span></span>
        <span class="wall-count"><span id="hud-walls-b">10</span> <small>walls</small></span>
        <span class="score-line" id="score-b">0 <small>wins</small></span>
      </div>
    </div>
  </div>

  <div id="action-bar">
    <button id="btn-move"   class="ctrl-btn active" title="Move your pawn">Move Pawn</button>
    <button id="btn-wall-h" class="ctrl-btn"        title="Place a horizontal wall">Horizontal Wall</button>
    <button id="btn-wall-v" class="ctrl-btn"        title="Place a vertical wall">Vertical Wall</button>
    <div class="btn-sep"></div>
    <button id="btn-reset"  class="ctrl-btn reset-btn" title="Restart game">Reset</button>
    <div class="btn-sep"></div>
    <button id="btn-change-mode" class="ctrl-btn mode-switch-btn" title="Back to game selection">Menu</button>
  </div>

  <div id="reset-confirm" class="hidden">
    <div id="reset-confirm-box">
      <p>Are you sure you want to reset the board?</p>
      <div class="confirm-btns">
        <button id="btn-confirm-yes" class="ctrl-btn">Yes</button>
        <button id="btn-confirm-no" class="ctrl-btn">No</button>
      </div>
    </div>
  </div>

  <div id="win-overlay" class="hidden">
    <div id="win-box">
      <div id="win-icon">&#9823;</div>
      <div id="win-message">Red wins!</div>
      <div id="win-sub">Reached the other side</div>
      <button id="btn-win-reset">Play Again</button>
      <a href="../" class="win-back">&larr; Back to Explore</a>
    </div>
  </div>

  <a id="back-link" href="../">&larr; Explore</a>

  <script type="module" src="../js/main.js"></script>
  <script type="module" src="../js/interaction.js"></script>

</body>
</html>
